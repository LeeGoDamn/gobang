<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五子棋游戏</title>
    <script type="module" crossorigin src="/assets/index-BD0GyFLq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-xzI4aTYX.css">
  </head>
  <body class="bg-gray-900 min-h-screen flex items-center justify-center overflow-hidden">
    <div class="flex flex-col items-center gap-6 p-4">
      <h1 class="text-4xl font-bold text-white">五子棋</h1>
      
      <div id="status" class="text-center text-white text-xl font-semibold min-h-12">
        黑棋先手
      </div>
      
      <canvas 
        id="gameCanvas" 
        width="600" 
        height="600"
        class="bg-yellow-100 border-4 border-amber-900 rounded-lg shadow-lg cursor-none"
      ></canvas>
      
      <div class="flex gap-4">
        <button 
          id="resetBtn"
          class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors"
        >
          重新开始
        </button>
        <button 
          id="undoBtn"
          class="px-6 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          撤销
        </button>
      </div>
    </div>
    
  </body>
</html>
