<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 人机对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #e94560;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 4px;
        }

        .board-wrapper {
            background: linear-gradient(145deg, #d4a574, #c49464);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 36px);
            grid-template-rows: repeat(15, 36px);
            gap: 0;
            background: #d4a574;
            position: relative;
        }

        .cell {
            width: 36px;
            height: 36px;
            position: relative;
            cursor: pointer;
        }

        .cell::before,
        .cell::after {
            content: '';
            position: absolute;
            background: #8b6914;
        }

        .cell::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .cell::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        .cell:first-child::before,
        .cell:nth-child(-n+15)::before {
            width: 50%;
            left: 50%;
        }

        .cell:nth-child(15n+1)::after {
            height: 50%;
            top: 50%;
        }

        .cell:nth-child(15n)::before {
            width: 50%;
        }

        .cell:nth-last-child(-n+15)::after {
            height: 50%;
        }

        .cell.star::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #8b6914;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .stone {
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            transition: all 0.2s ease;
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.5),
                inset -2px -2px 4px rgba(255, 255, 255, 0.1);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.3),
                inset -2px -2px 4px rgba(0, 0, 0, 0.1);
        }

        .stone.last-move {
            box-shadow: 
                0 0 0 3px #e94560,
                2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stone.preview {
            opacity: 0.5;
        }

        .cell:hover .stone.preview {
            opacity: 0.8;
        }

        .side-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .panel-section {
            margin-bottom: 25px;
        }

        .panel-section:last-child {
            margin-bottom: 0;
        }

        .panel-title {
            color: #e94560;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #e94560;
            border-radius: 2px;
        }

        .status {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
        }

        .status.turn-black {
            border-left: 4px solid #333;
        }

        .status.turn-white {
            border-left: 4px solid #fff;
        }

        .status.winner {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 10px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        .stat-item.wins .stat-value { color: #4ade80; }
        .stat-item.losses .stat-value { color: #f87171; }
        .stat-item.draws .stat-value { color: #fbbf24; }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .diff-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .diff-btn.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .game-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            justify-content: center;
            padding: 10px;
        }

        .thinking-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .modal-title.win { color: #4ade80; }
        .modal-title.lose { color: #f87171; }
        .modal-title.draw { color: #fbbf24; }

        .modal-text {
            color: #aaa;
            margin-bottom: 25px;
        }

        .winning-line {
            position: absolute;
            background: rgba(233, 69, 96, 0.8);
            height: 4px;
            transform-origin: left center;
            z-index: 10;
            border-radius: 2px;
            animation: lineGrow 0.5s ease;
        }

        @keyframes lineGrow {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }

            .board {
                grid-template-columns: repeat(15, 24px);
                grid-template-rows: repeat(15, 24px);
            }

            .cell {
                width: 24px;
                height: 24px;
            }

            .stone {
                width: 20px;
                height: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .side-panel {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="board-section">
            <h1>五子棋</h1>
            <div class="board-wrapper">
                <div class="board" id="board"></div>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-section">
                <div class="panel-title">游戏状态</div>
                <div class="status" id="status">黑方回合</div>
                <div class="thinking" id="thinking" style="display: none;">
                    <span>AI 思考中</span>
                    <div class="thinking-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">战绩统计</div>
                <div class="stats-grid">
                    <div class="stat-item wins">
                        <div class="stat-value" id="wins">0</div>
                        <div class="stat-label">胜利</div>
                    </div>
                    <div class="stat-item losses">
                        <div class="stat-value" id="losses">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                    <div class="stat-item draws">
                        <div class="stat-value" id="draws">0</div>
                        <div class="stat-label">平局</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">难度选择</div>
                <div class="difficulty-buttons">
                    <button class="diff-btn" data-depth="1">简单</button>
                    <button class="diff-btn active" data-depth="2">中等</button>
                    <button class="diff-btn" data-depth="3">困难</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">操作</div>
                <div class="game-buttons">
                    <button class="game-btn btn-primary" id="newGame">新游戏</button>
                    <button class="game-btn btn-secondary" id="undo" disabled>悔棋</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">游戏结束</div>
            <div class="modal-text" id="modal-text">再来一局？</div>
            <button class="game-btn btn-primary" id="modal-btn">再来一局</button>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        const STAR_POINTS = [
            [3, 3], [3, 7], [3, 11],
            [7, 3], [7, 7], [7, 11],
            [11, 3], [11, 7], [11, 11]
        ];

        let board = [];
        let currentPlayer = BLACK;
        let gameOver = false;
        let moveHistory = [];
        let searchDepth = 2;
        let stats = { wins: 0, losses: 0, draws: 0 };
        let isAiThinking = false;
        let lastMove = null;

        function init() {
            loadStats();
            createBoard();
            bindEvents();
            newGame();
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    if (STAR_POINTS.some(p => p[0] === i && p[1] === j)) {
                        cell.classList.add('star');
                    }

                    boardEl.appendChild(cell);
                }
            }
        }

        function bindEvents() {
            document.getElementById('board').addEventListener('click', handleCellClick);
            document.getElementById('board').addEventListener('mouseover', handleCellHover);
            document.getElementById('board').addEventListener('mouseout', handleCellOut);
            document.getElementById('newGame').addEventListener('click', newGame);
            document.getElementById('undo').addEventListener('click', undo);
            document.getElementById('modal-btn').addEventListener('click', () => {
                document.getElementById('modal').classList.remove('show');
                newGame();
            });

            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    searchDepth = parseInt(btn.dataset.depth);
                });
            });
        }

        function newGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentPlayer = BLACK;
            gameOver = false;
            moveHistory = [];
            lastMove = null;
            isAiThinking = false;

            updateBoard();
            updateStatus();
            updateUndoButton();
        }

        function handleCellClick(e) {
            if (gameOver || isAiThinking || currentPlayer !== BLACK) return;

            const cell = e.target.closest('.cell');
            if (!cell) return;

            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);

            if (board[row][col] !== EMPTY) return;

            makeMove(row, col, BLACK);

            if (!gameOver) {
                setTimeout(aiMove, 100);
            }
        }

        function handleCellHover(e) {
            if (gameOver || isAiThinking || currentPlayer !== BLACK) return;

            const cell = e.target.closest('.cell');
            if (!cell) return;

            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);

            if (board[row][col] !== EMPTY) return;

            clearPreviews();
            const stone = document.createElement('div');
            stone.className = 'stone black preview';
            cell.appendChild(stone);
        }

        function handleCellOut(e) {
            clearPreviews();
        }

        function clearPreviews() {
            document.querySelectorAll('.stone.preview').forEach(s => s.remove());
        }

        function makeMove(row, col, player) {
            board[row][col] = player;
            moveHistory.push({ row, col, player });
            lastMove = { row, col };
            updateBoard();
            updateUndoButton();

            const winner = checkWin(row, col, player);
            if (winner) {
                gameOver = true;
                handleGameEnd(player);
            } else if (isBoardFull()) {
                gameOver = true;
                handleGameEnd(null);
            } else {
                currentPlayer = player === BLACK ? WHITE : BLACK;
                updateStatus();
            }
        }

        function aiMove() {
            isAiThinking = true;
            document.getElementById('thinking').style.display = 'flex';
            updateStatus();

            setTimeout(() => {
                const move = findBestMove();
                isAiThinking = false;
                document.getElementById('thinking').style.display = 'none';

                if (move) {
                    makeMove(move.row, move.col, WHITE);
                }
            }, 300);
        }

        function findBestMove() {
            const candidates = getCandidateMoves();
            if (candidates.length === 0) {
                return { row: 7, col: 7 };
            }

            if (candidates.length === 1) {
                return candidates[0];
            }

            let bestMove = candidates[0];
            let bestScore = -Infinity;

            for (const move of candidates) {
                board[move.row][move.col] = WHITE;
                const score = minimax(searchDepth - 1, -Infinity, Infinity, false);
                board[move.row][move.col] = EMPTY;

                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }

            return bestMove;
        }

        function minimax(depth, alpha, beta, isMaximizing) {
            const winner = checkBoardWin();
            if (winner === WHITE) return 100000 + depth;
            if (winner === BLACK) return -100000 - depth;
            if (depth === 0 || isBoardFull()) return evaluateBoard();

            const candidates = getCandidateMoves();

            if (isMaximizing) {
                let maxScore = -Infinity;
                for (const move of candidates) {
                    board[move.row][move.col] = WHITE;
                    const score = minimax(depth - 1, alpha, beta, false);
                    board[move.row][move.col] = EMPTY;
                    maxScore = Math.max(maxScore, score);
                    alpha = Math.max(alpha, score);
                    if (beta <= alpha) break;
                }
                return maxScore;
            } else {
                let minScore = Infinity;
                for (const move of candidates) {
                    board[move.row][move.col] = BLACK;
                    const score = minimax(depth - 1, alpha, beta, true);
                    board[move.row][move.col] = EMPTY;
                    minScore = Math.min(minScore, score);
                    beta = Math.min(beta, score);
                    if (beta <= alpha) break;
                }
                return minScore;
            }
        }

        function getCandidateMoves() {
            const moves = [];
            const checked = new Set();

            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== EMPTY) {
                        for (let di = -2; di <= 2; di++) {
                            for (let dj = -2; dj <= 2; dj++) {
                                const ni = i + di;
                                const nj = j + dj;
                                const key = `${ni},${nj}`;
                                if (ni >= 0 && ni < BOARD_SIZE && nj >= 0 && nj < BOARD_SIZE &&
                                    board[ni][nj] === EMPTY && !checked.has(key)) {
                                    checked.add(key);
                                    moves.push({ row: ni, col: nj, score: evaluateMove(ni, nj) });
                                }
                            }
                        }
                    }
                }
            }

            if (moves.length === 0) {
                return [{ row: 7, col: 7 }];
            }

            moves.sort((a, b) => b.score - a.score);
            return moves.slice(0, 15);
        }

        function evaluateMove(row, col) {
            let score = 0;
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];

            for (const [dx, dy] of directions) {
                score += evaluateLineAt(row, col, dx, dy, WHITE) * 1.1;
                score += evaluateLineAt(row, col, dx, dy, BLACK);
            }

            if (row >= 5 && row <= 9 && col >= 5 && col <= 9) {
                score += 3;
            }

            return score;
        }

        function evaluateLineAt(row, col, dx, dy, player) {
            let count = 1;
            let openEnds = 0;
            let blocked = 0;

            for (let i = 1; i <= 4; i++) {
                const nr = row + dx * i;
                const nc = col + dy * i;
                if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) {
                    blocked++;
                    break;
                }
                if (board[nr][nc] === player) count++;
                else if (board[nr][nc] === EMPTY) {
                    openEnds++;
                    break;
                } else {
                    blocked++;
                    break;
                }
            }

            for (let i = 1; i <= 4; i++) {
                const nr = row - dx * i;
                const nc = col - dy * i;
                if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) {
                    blocked++;
                    break;
                }
                if (board[nr][nc] === player) count++;
                else if (board[nr][nc] === EMPTY) {
                    openEnds++;
                    break;
                } else {
                    blocked++;
                    break;
                }
            }

            return getPatternScore(count, openEnds, blocked);
        }

        function getPatternScore(count, openEnds, blocked) {
            if (count >= 5) return 100000;
            if (count === 4) {
                if (openEnds === 2) return 10000;
                if (openEnds === 1) return 1000;
            }
            if (count === 3) {
                if (openEnds === 2) return 1000;
                if (openEnds === 1) return 100;
            }
            if (count === 2) {
                if (openEnds === 2) return 100;
                if (openEnds === 1) return 10;
            }
            return count;
        }

        function evaluateBoard() {
            let score = 0;
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];

            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== EMPTY) {
                        for (const [dx, dy] of directions) {
                            const lineScore = evaluateLine(i, j, dx, dy);
                            if (board[i][j] === WHITE) {
                                score += lineScore;
                            } else {
                                score -= lineScore;
                            }
                        }
                    }
                }
            }

            return score;
        }

        function evaluateLine(row, col, dx, dy) {
            const player = board[row][col];
            let count = 1;
            let openEnds = 0;

            for (let i = 1; i <= 4; i++) {
                const nr = row + dx * i;
                const nc = col + dy * i;
                if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                if (board[nr][nc] === player) count++;
                else if (board[nr][nc] === EMPTY) {
                    openEnds++;
                    break;
                } else break;
            }

            for (let i = 1; i <= 4; i++) {
                const nr = row - dx * i;
                const nc = col - dy * i;
                if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                if (board[nr][nc] === player) count++;
                else if (board[nr][nc] === EMPTY) {
                    openEnds++;
                    break;
                } else break;
            }

            if (count >= 5) return 100000;
            if (count === 4 && openEnds >= 1) return 10000;
            if (count === 3 && openEnds >= 1) return 1000;
            if (count === 2 && openEnds >= 1) return 100;
            return count;
        }

        function checkWin(row, col, player) {
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];

            for (const [dx, dy] of directions) {
                let count = 1;
                const positions = [[row, col]];

                for (let i = 1; i <= 4; i++) {
                    const nr = row + dx * i;
                    const nc = col + dy * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                    positions.push([nr, nc]);
                }

                for (let i = 1; i <= 4; i++) {
                    const nr = row - dx * i;
                    const nc = col - dy * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                    positions.push([nr, nc]);
                }

                if (count >= 5) {
                    drawWinningLine(positions, dx, dy);
                    return player;
                }
            }

            return null;
        }

        function checkBoardWin() {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== EMPTY) {
                        const winner = checkWinNoLine(i, j, board[i][j]);
                        if (winner) return winner;
                    }
                }
            }
            return null;
        }

        function checkWinNoLine(row, col, player) {
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];

            for (const [dx, dy] of directions) {
                let count = 1;

                for (let i = 1; i <= 4; i++) {
                    const nr = row + dx * i;
                    const nc = col + dy * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                }

                for (let i = 1; i <= 4; i++) {
                    const nr = row - dx * i;
                    const nc = col - dy * i;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                }

                if (count >= 5) return player;
            }

            return null;
        }

        function drawWinningLine(positions, dx, dy) {
            positions.sort((a, b) => {
                if (dx !== 0) return a[0] - b[0];
                return a[1] - b[1];
            });

            const boardEl = document.getElementById('board');
            const cells = boardEl.querySelectorAll('.cell');
            const firstCell = cells[positions[0][0] * BOARD_SIZE + positions[0][1]];
            const lastCell = cells[positions[positions.length - 1][0] * BOARD_SIZE + positions[positions.length - 1][1]];

            const firstRect = firstCell.getBoundingClientRect();
            const lastRect = lastCell.getBoundingClientRect();
            const boardRect = boardEl.getBoundingClientRect();

            const startX = firstRect.left - boardRect.left + firstRect.width / 2;
            const startY = firstRect.top - boardRect.top + firstRect.height / 2;
            const endX = lastRect.left - boardRect.left + lastRect.width / 2;
            const endY = lastRect.top - boardRect.top + lastRect.height / 2;

            const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
            const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;

            const line = document.createElement('div');
            line.className = 'winning-line';
            line.style.left = `${startX}px`;
            line.style.top = `${startY}px`;
            line.style.width = `${length}px`;
            line.style.transform = `rotate(${angle}deg)`;

            boardEl.appendChild(line);
        }

        function isBoardFull() {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === EMPTY) return false;
                }
            }
            return true;
        }

        function undo() {
            if (moveHistory.length < 2 || gameOver) return;

            for (let i = 0; i < 2; i++) {
                const move = moveHistory.pop();
                board[move.row][move.col] = EMPTY;
            }

            lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
            currentPlayer = BLACK;
            updateBoard();
            updateStatus();
            updateUndoButton();
        }

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');

            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);

                const existingStone = cell.querySelector('.stone:not(.preview)');
                if (existingStone) existingStone.remove();

                const existingLine = cell.querySelector('.winning-line');
                if (existingLine) existingLine.remove();

                if (board[row][col] !== EMPTY) {
                    const stone = document.createElement('div');
                    stone.className = `stone ${board[row][col] === BLACK ? 'black' : 'white'}`;
                    if (lastMove && lastMove.row === row && lastMove.col === col) {
                        stone.classList.add('last-move');
                    }
                    cell.appendChild(stone);
                }
            });
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');

            if (gameOver) return;

            if (isAiThinking) {
                statusEl.textContent = 'AI 思考中...';
                statusEl.className = 'status turn-white';
            } else {
                statusEl.textContent = currentPlayer === BLACK ? '黑方回合（你的回合）' : '白方回合（AI）';
                statusEl.className = `status ${currentPlayer === BLACK ? 'turn-black' : 'turn-white'}`;
            }
        }

        function updateUndoButton() {
            const undoBtn = document.getElementById('undo');
            undoBtn.disabled = moveHistory.length < 2 || gameOver;
        }

        function handleGameEnd(winner) {
            const statusEl = document.getElementById('status');
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');

            if (winner === BLACK) {
                stats.wins++;
                statusEl.textContent = '恭喜你获胜！';
                statusEl.className = 'status winner';
                modalTitle.textContent = '胜利！';
                modalTitle.className = 'modal-title win';
                modalText.textContent = '你击败了 AI，太厉害了！';
            } else if (winner === WHITE) {
                stats.losses++;
                statusEl.textContent = 'AI 获胜！';
                statusEl.className = 'status';
                modalTitle.textContent = '失败';
                modalTitle.className = 'modal-title lose';
                modalText.textContent = 'AI 赢了这局，再接再厉！';
            } else {
                stats.draws++;
                statusEl.textContent = '平局！';
                statusEl.className = 'status';
                modalTitle.textContent = '平局';
                modalTitle.className = 'modal-title draw';
                modalText.textContent = '势均力敌，再来一局？';
            }

            saveStats();
            updateStatsDisplay();
            modal.classList.add('show');
        }

        function updateStatsDisplay() {
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('losses').textContent = stats.losses;
            document.getElementById('draws').textContent = stats.draws;
        }

        function saveStats() {
            localStorage.setItem('gomoku-stats', JSON.stringify(stats));
        }

        function loadStats() {
            const saved = localStorage.getItem('gomoku-stats');
            if (saved) {
                stats = JSON.parse(saved);
            }
            updateStatsDisplay();
        }

        init();
    </script>
</body>
</html>
